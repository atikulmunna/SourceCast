services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sourcecast
      POSTGRES_PASSWORD: replace-with-database-password
      POSTGRES_DB: sourcecast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcecast -d sourcecast"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production.example
    environment:
      DATABASE_URL: postgresql+asyncpg://sourcecast:replace-with-database-password@postgres:5432/sourcecast
      DIRECT_URL: postgresql+asyncpg://sourcecast:replace-with-database-password@postgres:5432/sourcecast
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      FRONTEND_URL: http://localhost:3000
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production.example
    environment:
      DATABASE_URL: postgresql+asyncpg://sourcecast:replace-with-database-password@postgres:5432/sourcecast
      DIRECT_URL: postgresql+asyncpg://sourcecast:replace-with-database-password@postgres:5432/sourcecast
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      FRONTEND_URL: http://localhost:3000
    command: ["python", "worker.py"]
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_APP_NAME: SourceCast
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
