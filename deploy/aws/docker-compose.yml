services:
  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - ${SOURCECAST_ENV_FILE:-./.env}
    command: ["./start-web.sh"]
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ../../backend
    restart: unless-stopped
    env_file:
      - ${SOURCECAST_ENV_FILE:-./.env}
    command: ["./start-worker.sh"]
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ../../frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-SourceCast}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      SOURCECAST_SITE_ADDRESS: ${SOURCECAST_SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
